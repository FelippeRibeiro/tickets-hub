<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c0c0e" />
    <title>Tickets Hub</title>
    <script>
      (function () {
        var KEY = 'tickets-hub-theme'
        var t = localStorage.getItem(KEY) || 'dark'
        var dark =
          t === 'dark' ||
          (t === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        var root = document.documentElement
        root.classList.toggle('dark', dark)
        root.style.colorScheme = dark ? 'dark' : 'light'
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', dark ? '#0c0c0e' : '#fafafa')
      })()
    </script>
    <script type="module" crossorigin src="/assets/index-DOGWkJfL.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Cyukq9e1.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
