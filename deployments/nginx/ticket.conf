# Nginx reverse proxy — tickets-hub.duckdns.org → app Go (porta 8080).
# Instalação típica:
#   sudo cp deployments/nginx/ticket.conf /etc/nginx/sites-available/tickets-hub
#   sudo ln -sf /etc/nginx/sites-available/tickets-hub /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: após `certbot --nginx -d tickets-hub.duckdns.org`, use o bloco 443 comentado
# no final ou deixe o Certbot ajustar este arquivo.

upstream tickets_hub_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name tickets-hub.duckdns.org;

    client_max_body_size 1G;

    location / {
        proxy_pass http://tickets_hub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

