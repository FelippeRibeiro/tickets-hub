  postgres:
    image: postgres:17
    container_name: ticket-postgres
    restart: always
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      app-network:

networks:
  app-network:

volumes:
  pgdata:
