  postgres:
    image: postgres:latest
    container_name: ticket-postgres
    restart: always
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    networks:
      app-network:
    volumes:
      # Aqui apontamos para o nome do volume antigo que você listou
      - old_volume_march:/var/lib/postgresql/data

networks:
  app-network:

volumes:
  # Declaramos o volume como externo para o Compose não tentar criar um novo
  old_volume_march:
    external: true
    name: d1f70fe1896c0a95fe2c7530d77285206aa5eafa730674e6b6d580671502746a
